<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ADNz Signature</title>
    <style>
      .adnz-wrap {
        margin-top: 18px;
        font-family: Arial, Helvetica, sans-serif;
      }

      .adnz-container {
        width: 100%;
        max-width: 660px;
      }

      .adnz-social {
        padding-bottom: 12px;
      }

      .adnz-social a {
        display: inline-block;
        margin-right: 8px;
        margin-bottom: 8px;
        padding: 6px 10px;
        border: 1px solid #d8dce5;
        border-radius: 999px;
        color: #1d2532;
        font-size: 12px;
        font-weight: 700;
        text-decoration: none;
        background: #f8faff;
      }

      .adnz-card {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        background: linear-gradient(100deg, #e8edf6 0%, #f2e8dd 55%, #d9e4f1 100%);
        border: 1px solid #d8dce5;
        border-radius: 42px 10px 42px 10px;
        overflow: hidden;
      }

      .adnz-card td {
        vertical-align: middle;
      }

      .adnz-photo-cell {
        width: 124px;
        padding: 14px 0 14px 16px;
      }

      .adnz-photo {
        display: block;
        width: 96px;
        height: 96px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid rgba(255, 255, 255, 0.8);
        background: #0c1022;
      }

      .adnz-text-cell {
        padding: 14px 16px 14px 4px;
      }

      .adnz-name {
        margin: 0;
        color: #111111;
        font-size: 38px;
        line-height: 1.05;
        font-weight: 800;
        letter-spacing: 0.2px;
      }

      .adnz-tagline {
        margin: 4px 0 0;
        color: #5a6472;
        font-size: 21px;
        line-height: 1.2;
        font-weight: 500;
      }

      .adnz-role {
        margin: 3px 0 0;
        color: #7e8794;
        font-size: 16px;
        line-height: 1.2;
      }

      @media only screen and (max-width: 620px) {
        .adnz-container {
          width: 100% !important;
        }

        .adnz-social {
          text-align: center !important;
        }

        .adnz-social a {
          margin-right: 6px !important;
          padding: 6px 9px !important;
          font-size: 11px !important;
        }

        .adnz-card {
          border-radius: 24px !important;
        }

        .adnz-photo-cell,
        .adnz-text-cell {
          display: block !important;
          width: 100% !important;
          padding: 12px 14px !important;
          text-align: center !important;
        }

        .adnz-photo {
          margin: 0 auto !important;
          width: 88px !important;
          height: 88px !important;
        }

        .adnz-name {
          font-size: 30px !important;
        }

        .adnz-tagline {
          font-size: 18px !important;
        }

        .adnz-role {
          font-size: 14px !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="adnz-wrap">
      <table class="adnz-container" role="presentation" cellpadding="0" cellspacing="0">
        <tr>
          <td class="adnz-social">
            <a href="https://www.facebook.com/profile.php?id=61573770329166" target="_blank" rel="noopener noreferrer">Facebook</a>
            <a href="https://www.instagram.com/adnz.perfume" target="_blank" rel="noopener noreferrer">Instagram</a>
            <a href="https://www.threads.com/@adnz.perfume" target="_blank" rel="noopener noreferrer">Threads</a>
            <a href="https://www.tiktok.com/@adnz_perfume" target="_blank" rel="noopener noreferrer">TikTok</a>
            <a href="https://t.me/adnz_perfume" target="_blank" rel="noopener noreferrer">Telegram</a>
            <a href="https://wa.me/84342988398" target="_blank" rel="noopener noreferrer">WhatsApp</a>
          </td>
        </tr>
        <tr>
          <td>
            <table class="adnz-card" role="presentation" cellpadding="0" cellspacing="0">
              <tr>
                <td class="adnz-photo-cell">
                  <img class="adnz-photo" src="https://adnz-perfume.com/logo/logo.jpg" alt="ADNz Perfume Logo" />
                </td>
                <td class="adnz-text-cell">
                  <p class="adnz-name">ADNz Perfume</p>
                  <p class="adnz-tagline">Your scent, your identity</p>
                  <p class="adnz-role">CEO_LE HOANG ANH</p>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </div>
  </body>
</html>
